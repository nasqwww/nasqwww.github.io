<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>nasqcasino</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #000 0%, #1a1a2e 50%, #000 100%);
            font-family: 'Courier New', monospace;
            color: #b8ff00;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            background: rgba(8, 8, 8, 0.9);
            padding: 40px;
            border-radius: 15px;
            border: 3px solid #b8ff00;
            box-shadow: 0 0 20px rgba(184, 255, 0, 0.5);
            max-width: 600px;
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        h1 {
            letter-spacing: 5px;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 0 0 10px rgba(184, 255, 0, 0.8);
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 5px rgba(184, 255, 0, 0.5);
            }
            50% {
                text-shadow: 0 0 20px rgba(184, 255, 0, 1), 0 0 30px rgba(184, 255, 0, 0.7);
            }
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .mode-btn {
            background: rgba(184, 255, 0, 0.2);
            color: #b8ff00;
            border: 2px solid #b8ff00;
            padding: 8px 15px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .mode-btn:hover {
            background: rgba(184, 255, 0, 0.4);
            transform: scale(1.05);
        }

        .mode-btn.active {
            background: #b8ff00;
            color: #080808;
            box-shadow: 0 0 15px #b8ff00;
        }

        .mode-info {
            font-size: 12px;
            color: #88cc00;
            margin-bottom: 15px;
            height: 20px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat-box {
            background: rgba(184, 255, 0, 0.1);
            border: 1px solid #b8ff00;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 14px;
        }

        .balance {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 15px;
            animation: balancePulse 0.3s ease-out;
        }

        @keyframes balancePulse {
            0% {
                transform: scale(1.2);
                color: #ffff00;
            }
            100% {
                transform: scale(1);
                color: #ffd700;
            }
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
            align-items: center;
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        input[type="number"] {
            background: #1a1a2e;
            border: 2px solid #b8ff00;
            color: #b8ff00;
            padding: 8px;
            width: 80px;
            text-align: center;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(184, 255, 0, 0.8);
        }

        input[type="range"] {
            width: 120px;
            cursor: pointer;
        }

        .slot-machine {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 3px solid #b8ff00;
            border-radius: 10px;
            padding: 30px;
            margin: 30px 0;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.8), 0 0 20px rgba(184, 255, 0, 0.3);
        }

        .slot {
            display: flex;
            gap: 25px;
            font-size: 80px;
            justify-content: center;
            margin: 20px 0;
        }

        .reel {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #b8ff00;
            border-radius: 8px;
            animation: reelGlow 1s ease-in-out infinite;
        }

        @keyframes reelGlow {
            0%, 100% {
                box-shadow: 0 0 5px rgba(184, 255, 0, 0.3);
            }
            50% {
                box-shadow: 0 0 15px rgba(184, 255, 0, 0.7);
            }
        }

        .reel.spinning {
            animation: spin 0.1s linear infinite, reelGlow 1s ease-in-out infinite;
        }

        @keyframes spin {
            from {
                transform: rotateY(0deg);
            }
            to {
                transform: rotateY(360deg);
            }
        }

        .reel.win {
            animation: winPulse 0.5s ease-out !important;
            background: rgba(255, 215, 0, 0.3);
            border-color: #ffff00;
        }

        @keyframes winPulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 5px rgba(184, 255, 0, 0.5);
            }
            50% {
                transform: scale(1.1);
                box-shadow: 0 0 25px rgba(255, 215, 0, 1);
            }
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #b8ff00, #88cc00);
            color: #080808;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(184, 255, 0, 0.3);
        }

        button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(184, 255, 0, 0.6);
        }

        button:active:not(:disabled) {
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result {
            margin-top: 20px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            min-height: 40px;
            padding: 10px;
            border-radius: 8px;
            animation: resultSlide 0.5s ease-out;
        }

        @keyframes resultSlide {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result.jackpot {
            background: rgba(255, 215, 0, 0.2);
            border: 2px solid #ffff00;
            color: #ffff00;
            animation: jackpotFlash 0.3s ease-in-out 3;
        }

        @keyframes jackpotFlash {
            0%, 100% {
                box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
            }
            50% {
                box-shadow: 0 0 30px rgba(255, 215, 0, 1);
            }
        }

        .result.win {
            background: rgba(184, 255, 0, 0.2);
            border: 2px solid #b8ff00;
            color: #b8ff00;
        }

        .result.lose {
            background: rgba(255, 0, 0, 0.1);
            border: 2px solid #ff6666;
            color: #ff6666;
        }

        .multiplier {
            font-size: 14px;
            color: #ffd700;
            margin-top: 10px;
        }

        .confetti {
            position: fixed;
            pointer-events: none;
            animation: confettiFall 3s linear forwards;
        }

        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotateZ(360deg);
                opacity: 0;
            }
        }

        .auto-spin-controls {
            background: rgba(136, 204, 0, 0.1);
            border: 1px solid #88cc00;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 12px;
        }

        .auto-spin-controls input {
            margin: 0 5px;
        }

        .toggle-btn {
            background: rgba(184, 255, 0, 0.3);
            padding: 8px 12px;
            font-size: 12px;
            width: auto;
        }

        .toggle-btn.active {
            background: #b8ff00;
            color: #080808;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .slot {
                gap: 15px;
                font-size: 50px;
            }

            .reel {
                width: 70px;
                height: 70px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🎰 NASQCASINO 🎰</h1>

        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('classic')">Classic</button>
            <button class="mode-btn" onclick="setMode('high-roller')">High Roller</button>
            <button class="mode-btn" onclick="setMode('jackpot')">Jackpot Hunt</button>
            <button class="mode-btn" onclick="setMode('lightning')">Lightning</button>
        </div>

        <div class="mode-info" id="modeInfo"></div>

        <div class="stats">
            <div class="stat-box">Wins: <span id="wins">0</span></div>
            <div class="stat-box">Losses: <span id="losses">0</span></div>
            <div class="stat-box">Multiplier: <span id="multiplier">1x</span></div>
        </div>

        <div class="balance">💰 Balance: <span id="balance">1000</span> coins</div>

        <div class="auto-spin-controls">
            <label>Auto Spin:
                <input type="number" id="autoSpins" value="0" min="0" max="100">
            </label>
            <button class="toggle-btn" id="autoSpinBtn" onclick="toggleAutoSpin()">OFF</button>
        </div>

        <div class="controls">
            <label>Bet:
                <input type="number" id="bet" value="50" min="1" max="10000">
            </label>
            <label>or
                <input type="range" id="betSlider" min="10" max="500" value="50" oninput="syncBetSlider()">
            </label>
        </div>

        <div class="slot-machine">
            <div class="slot">
                <div class="reel" id="r1">?</div>
                <div class="reel" id="r2">?</div>
                <div class="reel" id="r3">?</div>
            </div>
        </div>

        <div class="button-group">
            <button onclick="spin()">🎯 SPIN 🎯</button>
            <button onclick="resetBalance()">💥 RESET</button>
        </div>

        <div class="result" id="result"></div>
    </div>

    <script>
        const symbols = ["🍒", "🍋", "💎", "7️⃣", "🍀", "🎁", "💰", "⭐"];
        let balance = localStorage.getItem("nasq_balance") ? parseInt(localStorage.getItem("nasq_balance")) : 1000;
        let gameMode = 'classic';
        let isSpinning = false;
        let stats = JSON.parse(localStorage.getItem("nasq_stats")) || { wins: 0, losses: 0, multiplier: 1 };
        let autoSpinActive = false;
        let autoSpinCount = 0;

        const modes = {
            classic: {
                name: "Classic Mode",
                desc: "Balanced payouts. 3 match = 5x, 2 match = 2x",
                jackpotChance: 0.05,
                twoMatchMult: 2
            },
            'high-roller': {
                name: "High Roller",
                desc: "Risky but rewarding. 3 match = 10x, 2 match = 3x",
                jackpotChance: 0.03,
                twoMatchMult: 3
            },
            jackpot: {
                name: "Jackpot Hunt",
                desc: "Rare wins, huge payouts. 3 match = 20x, 2 match = 4x",
                jackpotChance: 0.01,
                twoMatchMult: 4
            },
            lightning: {
                name: "Lightning Mode",
                desc: "Fast spins! Multiplier increases each spin. 3 match = 3x * mult, 2 match = 1.5x * mult",
                jackpotChance: 0.08,
                twoMatchMult: 1.5
            }
        };

        updateDisplay();

        function setMode(mode) {
            gameMode = mode;
            stats.multiplier = 1;
            localStorage.setItem("nasq_stats", JSON.stringify(stats));
            document.querySelectorAll(".mode-btn").forEach(btn => btn.classList.remove("active"));
            event.target.classList.add("active");
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById("balance").textContent = balance;
            document.getElementById("wins").textContent = stats.wins;
            document.getElementById("losses").textContent = stats.losses;
            document.getElementById("multiplier").textContent = stats.multiplier + "x";
            document.getElementById("modeInfo").textContent = modes[gameMode].desc;
            localStorage.setItem("nasq_balance", balance);
            localStorage.setItem("nasq_stats", JSON.stringify(stats));
        }

        function syncBetSlider() {
            document.getElementById("bet").value = document.getElementById("betSlider").value;
        }

        function toggleAutoSpin() {
            const spins = parseInt(document.getElementById("autoSpins").value) || 0;
            if (spins > 0 && !autoSpinActive) {
                autoSpinActive = true;
                autoSpinCount = spins;
                document.getElementById("autoSpinBtn").textContent = "SPINNING...";
                document.getElementById("autoSpinBtn").classList.add("active");
                autoSpinNext();
            } else {
                autoSpinActive = false;
                document.getElementById("autoSpinBtn").textContent = "OFF";
                document.getElementById("autoSpinBtn").classList.remove("active");
            }
        }

        function autoSpinNext() {
            if (autoSpinActive && autoSpinCount > 0) {
                autoSpinCount--;
                spin();
                setTimeout(autoSpinNext, 2500);
            } else {
                autoSpinActive = false;
                document.getElementById("autoSpinBtn").textContent = "OFF";
                document.getElementById("autoSpinBtn").classList.remove("active");
            }
        }

        function spin() {
            if (isSpinning) return;

            const bet = parseInt(document.getElementById("bet").value);
            const resultText = document.getElementById("result");

            if (bet > balance || bet <= 0) {
                resultText.textContent = "❌ Invalid bet";
                resultText.className = "result lose";
                return;
            }

            if (bet > 10000) {
                resultText.textContent = "❌ Max bet is 10000";
                resultText.className = "result lose";
                return;
            }

            isSpinning = true;
            balance -= bet;
            resultText.textContent = "🔄 Spinning...";
            resultText.className = "result";

            const reels = [
                document.getElementById("r1"),
                document.getElementById("r2"),
                document.getElementById("r3")
            ];

            // Start spinning animation
            reels.forEach(reel => reel.classList.add("spinning"));

            // Spin duration increases with lightning mode
            const spinDuration = gameMode === 'lightning' ? 800 : 1200;

            setTimeout(() => {
                const r1 = randomSymbol();
                const r2 = randomSymbol();
                const r3 = randomSymbol();

                reels.forEach(reel => reel.classList.remove("spinning"));

                reels[0].textContent = r1;
                reels[1].textContent = r2;
                reels[2].textContent = r3;

                let winAmount = 0;
                let isJackpot = false;

                if (r1 === r2 && r2 === r3) {
                    isJackpot = true;
                    stats.wins++;

                    switch (gameMode) {
                        case 'classic':
                            winAmount = bet * 5 * stats.multiplier;
                            break;
                        case 'high-roller':
                            winAmount = bet * 10 * stats.multiplier;
                            break;
                        case 'jackpot':
                            winAmount = bet * 20 * stats.multiplier;
                            break;
                        case 'lightning':
                            winAmount = bet * 3 * stats.multiplier;
                            stats.multiplier += 0.5;
                            break;
                    }

                    balance += winAmount;
                    resultText.textContent = "🎉 JACKPOT! +" + winAmount;
                    resultText.className = "result jackpot";
                    reels.forEach(reel => reel.classList.add("win"));

                    createConfetti();
                } else if (r1 === r2 || r2 === r3 || r1 === r3) {
                    stats.wins++;

                    switch (gameMode) {
                        case 'classic':
                            winAmount = bet * 2 * stats.multiplier;
                            break;
                        case 'high-roller':
                            winAmount = bet * 3 * stats.multiplier;
                            break;
                        case 'jackpot':
                            winAmount = bet * 4 * stats.multiplier;
                            break;
                        case 'lightning':
                            winAmount = bet * 1.5 * stats.multiplier;
                            break;
                    }

                    balance += winAmount;
                    resultText.textContent = "✨ Win! +" + winAmount;
                    resultText.className = "result win";
                    reels.forEach(reel => reel.classList.add("win"));
                    stats.multiplier += 0.25;
                } else {
                    stats.losses++;
                    resultText.textContent = "💔 You lost " + bet + " coins";
                    resultText.className = "result lose";

                    if (gameMode === 'lightning') {
                        stats.multiplier = 1;
                    } else {
                        stats.multiplier = Math.max(1, stats.multiplier - 0.1);
                    }
                }

                setTimeout(() => {
                    reels.forEach(reel => reel.classList.remove("win"));
                }, 800);

                updateDisplay();
                isSpinning = false;
            }, spinDuration);
        }

        function createConfetti() {
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement("div");
                confetti.className = "confetti";
                confetti.textContent = ["🎉", "💰", "⭐", "🎊"][Math.floor(Math.random() * 4)];
                confetti.style.left = Math.random() * 100 + "vw";
                confetti.style.top = "-50px";
                confetti.style.font-size = (Math.random() * 20 + 20) + "px";
                confetti.style.animation = `confettiFall ${Math.random() * 2 + 2}s linear forwards`;
                document.body.appendChild(confetti);

                setTimeout(() => confetti.remove(), 3000);
            }
        }

        function randomSymbol() {
            return symbols[Math.floor(Math.random() * symbols.length)];
        }

        function resetBalance() {
            if (confirm("Are you sure you want to reset your balance to 1000?")) {
                balance = 1000;
                stats = { wins: 0, losses: 0, multiplier: 1 };
                document.getElementById("result").textContent = "🔄 Balance reset!";
                updateDisplay();
            }
        }
    </script>

</body>

</html>
