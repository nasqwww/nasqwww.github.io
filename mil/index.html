<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON_SYNC // P2P_PROTOCOL</title>
    
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --cyan: #00f3ff;
            --magenta: #ff00ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 243, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background: var(--bg);
            color: white;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Анимированный фон (Scanlines + Grid) */
        body::before {
            content: ""; position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%; z-index: 10; pointer-events: none;
        }

        #canvas-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.3; }

        /* Интерфейс */
        header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(10px); background: var(--glass);
        }

        .terminal-text { font-family: 'Orbitron'; font-size: 14px; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }

        #main-container {
            flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; gap: 15px;
            scrollbar-width: none;
        }

        .node-card {
            background: var(--glass); border: 1px solid var(--border); padding: 15px;
            border-radius: 4px; animation: slideIn 0.4s ease forwards;
        }

        .msg { padding: 10px; margin-bottom: 5px; border-left: 2px solid var(--magenta); background: rgba(255, 0, 255, 0.05); }
        .msg.self { border-left: none; border-right: 2px solid var(--cyan); background: rgba(0, 243, 255, 0.05); text-align: right; }

        .controls {
            padding: 20px; display: flex; gap: 10px; background: var(--glass); border-top: 1px solid var(--border);
        }

        input[type="text"] {
            flex: 1; background: transparent; border: 1px solid var(--border); color: white; padding: 12px;
            font-family: inherit; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--cyan); box-shadow: 0 0 15px var(--border); }

        .btn {
            background: transparent; border: 1px solid var(--cyan); color: var(--cyan);
            padding: 10px 20px; font-family: 'Orbitron'; text-transform: uppercase;
            transition: 0.3s; overflow: hidden; position: relative;
        }
        .btn:hover { background: var(--cyan); color: black; box-shadow: 0 0 20px var(--cyan); }

        /* Скрытые элементы */
        #qr-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100;
            display: none; align-items: center; justify-content: center; flex-direction: column;
        }
        #qrcode { background: white; padding: 15px; border-radius: 8px; }

        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<header>
    <div class="terminal-text">P2P_LINK // STATUS: <span id="status">INIT...</span></div>
    <div style="display: flex; gap: 10px;">
        <button class="btn" onclick="UI.toggleQR()">LINK_QR</button>
        <button class="btn" onclick="UI.copyLink()">COPY_URL</button>
    </div>
</header>

<div id="main-container">
    <div class="node-card" id="sys-log">
        <div style="color: var(--magenta)">> SYSTEM READY. AWAITING CONNECTION...</div>
    </div>
</div>

<div class="controls">
    <button class="btn" onclick="document.getElementById('file-input').click()">📁</button>
    <input type="file" id="file-input" hidden multiple onchange="Net.handleFile(this)">
    <input type="text" id="msg-input" placeholder="ENTER ENCRYPTED STRING..." autocomplete="off">
    <button class="btn" onclick="Net.sendText()">EXECUTE</button>
</div>

<div id="qr-modal" onclick="this.style.display='none'">
    <div id="qrcode"></div>
    <div class="terminal-text" style="margin-top: 20px;">SCAN TO JOIN_ROOM</div>
</div>

<script>
/**
 * CORE LOGIC - PEERJS ADAPTATION
 */
const Net = {
    peer: null,
    conn: null,
    room: '',

    init() {
        const hash = window.location.hash.substring(1) || Math.random().toString(36).substr(2, 6);
        window.location.hash = hash;
        this.room = 'NEO-' + hash;

        // Инициализация Peer с STUN серверами Google для обхода NAT
        this.peer = new Peer(this.room, {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        });

        this.peer.on('open', (id) => {
            UI.status('LISTENING', true);
            UI.log(`ROOM_ID: ${id}`, 'magenta');
        });

        this.peer.on('connection', (c) => {
            this.conn = c;
            this.setupEvents();
        });

        this.peer.on('error', (err) => {
            if (err.type === 'unavailable-id') this.connectAsClient();
            else UI.log(`ERR: ${err.type}`, 'red');
        });
    },

    connectAsClient() {
        if (this.peer) this.peer.destroy();
        this.peer = new Peer();
        this.peer.on('open', () => {
            const c = this.peer.connect(this.room, { reliable: true });
            this.conn = c;
            this.setupEvents();
        });
    },

    setupEvents() {
        this.conn.on('open', () => {
            UI.status('CONNECTED', true);
            UI.log('CONNECTION_ESTABLISHED', 'cyan');
            // Пинг для удержания соединения на мобилках
            setInterval(() => this.conn.send({ type: 'ping' }), 3000);
        });

        this.conn.on('data', (data) => {
            if (data.type === 'text') UI.renderMsg(data.val, 'peer');
            if (data.type === 'file') UI.renderFile(data);
        });
    },

    sendText() {
        const input = document.getElementById('msg-input');
        if (!input.value || !this.conn) return;
        this.conn.send({ type: 'text', val: input.value });
        UI.renderMsg(input.value, 'self');
        input.value = '';
    },

    handleFile(el) {
        const file = el.files[0];
        if (!file || !this.conn) return;
        UI.log(`UPLOADING: ${file.name}...`, 'cyan');
        this.conn.send({
            type: 'file',
            file: file,
            name: file.name,
            mime: file.type
        });
    }
};

const UI = {
    log(m, color) {
        const log = document.getElementById('main-container');
        const div = document.createElement('div');
        div.style.color = `var(--${color})`;
        div.innerHTML = `> ${m}`;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    },

    renderMsg(m, type) {
        const log = document.getElementById('main-container');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = m;
        log.appendChild(div);
        gsap.from(div, { x: type === 'self' ? 20 : -20, opacity: 0, duration: 0.3 });
        log.scrollTop = log.scrollHeight;
    },

    renderFile(data) {
        const blob = new Blob([data.file], { type: data.mime });
        const url = URL.createObjectURL(blob);
        const log = document.getElementById('main-container');
        const div = document.createElement('div');
        div.className = 'msg peer';
        div.innerHTML = `RECEIVED_FILE: <a href="${url}" download="${data.name}" style="color:var(--cyan)">${data.name}</a>`;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    },

    status(txt, active) {
        const el = document.getElementById('status');
        el.innerText = txt;
        el.style.color = active ? 'var(--cyan)' : 'var(--magenta)';
    },

    toggleQR() {
        const m = document.getElementById('qr-modal');
        const isHidden = m.style.display !== 'flex';
        m.style.display = isHidden ? 'flex' : 'none';
        if (isHidden) {
            document.getElementById('qrcode').innerHTML = '';
            new QRCode(document.getElementById("qrcode"), window.location.href);
        }
    },

    copyLink() {
        navigator.clipboard.writeText(window.location.href);
        this.log('LINK_COPIED_TO_CLIPBOARD', 'cyan');
    }
};

// Запуск фона
const canvas = document.getElementById('canvas-bg');
const ctx = canvas.getContext('2d');
let w, h;
function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

function draw() {
    ctx.clearRect(0,0,w,h);
    ctx.strokeStyle = 'rgba(0, 243, 255, 0.05)';
    for(let i=0; i<w; i+=40) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke();
    }
    for(let i=0; i<h; i+=40) {
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke();
    }
    requestAnimationFrame(draw);
}
draw();

document.getElementById('msg-input').onkeypress = (e) => { if(e.key==='Enter') Net.sendText(); };
Net.init();
</script>
</body>
</html>
