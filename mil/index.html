<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Transfer • Реал-тайм</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        :root { --accent: #00f0ff; }
        * { font-family: 'Inter', system_ui, sans-serif; }
        body { background: #0a0a0a; color: #fff; }
        .chat { scrollbar-width: thin; scrollbar-color: #00f0ff #1f1f1f; }
        .chat::-webkit-scrollbar { height: 6px; }
        .bubble {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .bubble:hover { transform: scale(1.03); }
        .message-own { background: #00f0ff; color: #000; border-bottom-right-radius: 4px !important; }
        .message-other { background: #1f1f1f; border-bottom-left-radius: 4px !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- HEADER -->
    <div class="bg-[#111] border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-[#00f0ff] text-black rounded-3xl flex items-center justify-center text-3xl shadow-[0_0_20px_#00f0ff]">📤</div>
                <div>
                    <h1 class="text-3xl font-semibold tracking-tighter">Instant Transfer</h1>
                    <p class="text-[#00f0ff] text-sm font-medium">текст • фото • видео • файлы • реал-тайм</p>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div id="room-pill" onclick="copyRoomLink()" 
                     class="flex items-center bg-white/10 hover:bg-white/20 px-5 h-10 rounded-3xl text-sm font-medium cursor-pointer transition-colors">
                    <span class="text-emerald-400 mr-2">●</span>
                    <span id="room-name" class="font-mono"></span>
                </div>

                <button onclick="showQR()" 
                        class="flex items-center gap-2 bg-white/10 hover:bg-white/20 px-5 h-10 rounded-3xl text-sm font-medium transition-colors">
                    <span class="text-xl">📱</span>
                    QR-код
                </button>

                <button onclick="togglePrivateMode()" id="private-btn"
                        class="flex items-center gap-2 bg-white/10 hover:bg-white/20 px-5 h-10 rounded-3xl text-sm font-medium transition-colors">
                    <span id="lock-icon" class="text-xl">🔓</span>
                    <span id="private-text">Приватный режим</span>
                </button>
            </div>
        </div>
    </div>

    <!-- MESSAGES -->
    <div id="messages" class="chat flex-1 max-w-5xl mx-auto w-full px-6 py-8 overflow-y-auto flex flex-col gap-6 bg-[#0a0a0a]"></div>

    <!-- INPUT -->
    <div class="bg-[#111] border-t border-white/10 sticky bottom-0 z-50">
        <div class="max-w-5xl mx-auto px-6 py-5">
            <div class="flex gap-3 bg-white/5 rounded-3xl px-6 py-3 items-end">
                <input id="text-input" type="text" 
                       placeholder="Напиши сообщение или кинь файл..." 
                       onkeydown="if(event.keyCode===13) sendText()"
                       class="flex-1 bg-transparent outline-none text-lg placeholder:text-white/40">

                <label class="cursor-pointer flex items-center justify-center w-12 h-12 hover:bg-white/10 rounded-2xl transition-colors">
                    <span class="text-4xl">📎</span>
                    <input id="file-input" type="file" class="hidden" onchange="handleFile(this.files[0])">
                </label>

                <button onclick="sendText()" 
                        class="w-12 h-12 bg-[#00f0ff] text-black rounded-3xl flex items-center justify-center text-4xl hover:scale-110 active:scale-95 transition-all">
                    →
                </button>
            </div>
            <p class="text-center text-xs text-white/30 mt-3">GitHub Pages • Без регистрации • Мгновенная синхронизация</p>
        </div>
    </div>

    <!-- QR MODAL -->
    <div id="qr-modal" onclick="if(event.target.id==='qr-modal')hideQR()" 
         class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999]">
        <div onclick="event.stopImmediatePropagation()" 
             class="bg-[#111] rounded-3xl p-8 max-w-[340px] w-full text-center">
            <h3 class="text-2xl font-semibold mb-6">Сканируй и заходи в комнату</h3>
            <div id="qr-container" class="mx-auto bg-white p-4 rounded-2xl inline-block"></div>
            <p id="qr-room-text" class="font-mono text-[#00f0ff] mt-6 text-sm"></p>
            <button onclick="hideQR()" 
                    class="mt-8 w-full py-4 bg-white/10 hover:bg-white/20 rounded-3xl text-lg">Закрыть</button>
        </div>
    </div>

    <script>
        // ====================== CONFIG ======================
        let gun, messagesRef;
        let currentRoom = '';
        let myDeviceId = 'dev-' + Math.random().toString(36).slice(2) + Date.now();
        let encryptionPassword = '';
        let rendered = new Set();

        // ====================== UTILS ======================
        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function formatTime(ts) {
            return new Date(ts).toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
        }

        function autoScroll() {
            const el = document.getElementById('messages');
            el.scrollTop = el.scrollHeight;
        }

        function copyRoomLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                const pill = document.getElementById('room-pill');
                const orig = pill.innerHTML;
                pill.style.backgroundColor = '#10b981';
                setTimeout(() => pill.innerHTML = orig, 1200);
            });
        }

        // ====================== GUN INIT ======================
        function initGun() {
            gun = Gun({
                peers: [
                    'https://peer.wallie.io/gun',
                    'https://gunjs.herokuapp.com/gun'
                ],
                localStorage: true,
                radisk: true
            });

            const roomKey = 'room-' + currentRoom;
            messagesRef = gun.get(roomKey).get('messages');
            
            // Fixed listener with data check
            messagesRef.map().on((data, key) => {
                if (!data || !data.type) return;
                if (rendered.has(key)) return;
                rendered.add(key);
                handleIncomingMessage(data, key);
            });
        }

        // ====================== ROOM ======================
        function getRoomFromHash() {
            let room = window.location.hash.replace('#', '').trim();
            if (!room) {
                room = 'room-' + Math.floor(Math.random() * 99999999);
                window.location.hash = room;
            }
            return room;
        }

        function updateRoomUI() {
            document.getElementById('room-name').textContent = '#' + currentRoom;
        }

        // ====================== ENCRYPTION ======================
        function isEncryptedMode() {
            return encryptionPassword.length > 0;
        }

        function encryptPayload(payload) {
            if (!isEncryptedMode()) return { type: 'plain', data: payload };
            const json = JSON.stringify(payload);
            const encrypted = CryptoJS.AES.encrypt(json, encryptionPassword).toString();
            return { type: 'encrypted', data: encrypted };
        }

        function decryptIfNeeded(item) {
            if (item.type === 'plain') return item.data;
            if (!isEncryptedMode()) return null;
            try {
                const bytes = CryptoJS.AES.decrypt(item.data, encryptionPassword);
                const json = bytes.toString(CryptoJS.enc.Utf8);
                return JSON.parse(json);
            } catch(e) {
                return null;
            }
        }

        // ====================== RENDER ======================
        function renderMessage(msg, isOwn) {
            const container = document.getElementById('messages');
            let html = '';

            if (msg.type === 'text') {
                html = `
                <div class="flex ${isOwn ? 'justify-end' : 'justify-start'}">
                    <div onclick="copyMessage(this)" class="bubble max-w-[75%] px-6 py-4 rounded-3xl ${isOwn ? 'message-own' : 'message-other'} cursor-pointer">
                        <p class="text-[17px]">${escapeHtml(msg.content)}</p>
                        <div class="flex justify-between text-xs opacity-70 mt-2">
                            <span>${formatTime(msg.timestamp)}</span>
                            ${isOwn ? '<span class="font-semibold">ТЫ</span>' : ''}
                        </div>
                    </div>
                </div>`;
            } 
            else if (msg.type === 'file') {
                if (msg.contentType && msg.contentType.startsWith('image/')) {
                    html = `
                    <div class="flex ${isOwn ? 'justify-end' : 'justify-start'}">
                        <div class="bubble max-w-[75%] rounded-3xl ${isOwn ? 'message-own' : 'message-other'} p-2 cursor-pointer" onclick="copyMessage(this)">
                            <img src="${msg.data}" class="rounded-2xl max-w-[280px] shadow-2xl" alt="">
                            <div class="flex justify-between text-xs opacity-70 px-3 py-2">
                                <span>${msg.filename}</span>
                                <span>${formatTime(msg.timestamp)}</span>
                                ${isOwn ? '<span class="font-semibold">ТЫ</span>' : ''}
                            </div>
                        </div>
                    </div>`;
                } 
                else if (msg.contentType && msg.contentType.startsWith('video/')) {
                    html = `
                    <div class="flex ${isOwn ? 'justify-end' : 'justify-start'}">
                        <div class="bubble max-w-[75%] rounded-3xl ${isOwn ? 'message-own' : 'message-other'} p-2 cursor-pointer" onclick="copyMessage(this)">
                            <video src="${msg.data}" controls class="rounded-2xl max-w-[280px] shadow-2xl"></video>
                            <div class="flex justify-between text-xs opacity-70 px-3 py-2">
                                <span>${msg.filename}</span>
                                <span>${formatTime(msg.timestamp)}</span>
                                ${isOwn ? '<span class="font-semibold">ТЫ</span>' : ''}
                            </div>
                        </div>
                    </div>`;
                } 
                else {
                    html = `
                    <div class="flex ${isOwn ? 'justify-end' : 'justify-start'}">
                        <div onclick="copyMessage(this)" class="bubble max-w-[75%] px-6 py-4 rounded-3xl ${isOwn ? 'message-own' : 'message-other'} cursor-pointer flex items-center gap-4">
                            <div class="text-5xl">📦</div>
                            <div class="flex-1">
                                <div class="font-medium">${msg.filename}</div>
                                <a href="${msg.data}" download="${msg.filename}" class="text-xs underline">Скачать</a>
                            </div>
                            <div class="text-xs opacity-70">${formatTime(msg.timestamp)}</div>
                            ${isOwn ? '<span class="font-semibold">ТЫ</span>' : ''}
                        </div>
                    </div>`;
                }
            }

            container.innerHTML += html;
            autoScroll();
        }

        function copyMessage(el) {
            const text = el.innerText || el.querySelector('p')?.innerText || 'Скопировано';
            navigator.clipboard.writeText(text).then(() => {
                const origColor = el.style.backgroundColor;
                el.style.backgroundColor = '#22c55e';
                setTimeout(() => { el.style.backgroundColor = origColor || ''; }, 800);
            });
        }

        function handleIncomingMessage(data, key) {
            if (!data) return;
            const decrypted = decryptIfNeeded(data);
            if (!decrypted) {
                const container = document.getElementById('messages');
                container.innerHTML += `
                <div class="flex justify-center my-4">
                    <div class="bg-amber-900/30 text-amber-400 text-xs px-6 py-2 rounded-3xl flex items-center gap-2">
                        <span>🔒 Зашифровано</span>
                        <span class="cursor-pointer underline" onclick="promptForPassword()">Ввести пароль</span>
                    </div>
                </div>`;
                autoScroll();
                return;
            }
            const isOwn = decrypted.deviceId === myDeviceId;
            renderMessage(decrypted, isOwn);
        }

        // ====================== SEND (FIXED with .get().put()) ======================
        function sendText() {
            const input = document.getElementById('text-input');
            const text = input.value.trim();
            if (!text || !messagesRef) return;

            const payload = {
                type: 'text',
                content: text,
                timestamp: Date.now(),
                deviceId: myDeviceId
            };

            const toStore = encryptPayload(payload);
            const uniqueKey = Date.now() + '_' + Math.random().toString(36).slice(2);
            messagesRef.get(uniqueKey).put(toStore);
            input.value = '';
        }

        async function handleFile(file) {
            if (!file || !messagesRef) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const payload = {
                    type: 'file',
                    filename: file.name,
                    contentType: file.type,
                    data: e.target.result,
                    timestamp: Date.now(),
                    deviceId: myDeviceId
                };

                const toStore = encryptPayload(payload);
                const uniqueKey = Date.now() + '_' + Math.random().toString(36).slice(2);
                messagesRef.get(uniqueKey).put(toStore);
            };
            reader.readAsDataURL(file);
        }

        // ====================== PRIVATE MODE ======================
        function togglePrivateMode() {
            if (encryptionPassword) {
                if (confirm('Отключить приватный режим?')) {
                    encryptionPassword = '';
                    sessionStorage.removeItem('enc-' + currentRoom);
                    document.getElementById('lock-icon').textContent = '🔓';
                    document.getElementById('private-text').textContent = 'Приватный режим';
                }
                return;
            }

            const pass = prompt('Введи пароль для этой комнаты:');
            if (!pass) return;
            encryptionPassword = pass;
            sessionStorage.setItem('enc-' + currentRoom, pass);
            document.getElementById('lock-icon').textContent = '🔐';
            document.getElementById('private-text').textContent = 'Приватно';
            alert('✅ Приватный режим включён. Сообщи пароль второму устройству!');
        }

        function promptForPassword() {
            const pass = prompt('Введи пароль комнаты:');
            if (pass) {
                encryptionPassword = pass;
                sessionStorage.setItem('enc-' + currentRoom, pass);
                location.reload();
            }
        }

        // ====================== QR ======================
        function showQR() {
            const modal = document.getElementById('qr-modal');
            const container = document.getElementById('qr-container');
            container.innerHTML = '';
            new QRCode(container, {
                text: window.location.href,
                width: 280,
                height: 280,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
            document.getElementById('qr-room-text').innerHTML = `Комната: <b>#${currentRoom}</b>`;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function hideQR() {
            const modal = document.getElementById('qr-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // ====================== BOOT ======================
        function start() {
            currentRoom = getRoomFromHash();
            updateRoomUI();

            const savedPass = sessionStorage.getItem('enc-' + currentRoom);
            if (savedPass) {
                encryptionPassword = savedPass;
                document.getElementById('lock-icon').textContent = '🔐';
                document.getElementById('private-text').textContent = 'Приватно';
            }

            initGun();

            console.log('%c🚀 Instant Transfer — финальная стабильная версия (Gun с .get().put() и проверкой данных)', 'color:#00f0ff;font-size:13px');
            console.log('%c📱 Открой одинаковый URL на ПК и телефоне (#room123) — сообщения приходят мгновенно', 'color:#00f0ff;font-size:13px');
        }

        window.onload = start;
    </script>
</body>
</html>
