<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL_SYNC_V3</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ff41;
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --error: #ff3e3e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--neon);
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- UI DESIGN --- */
        header {
            padding: 15px;
            border-bottom: 2px solid var(--neon);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 255, 65, 0.05);
        }

        .status-box { display: flex; align-items: center; gap: 10px; font-size: 12px; }
        .indicator { width: 10px; height: 10px; border-radius: 50%; background: var(--error); box-shadow: 0 0 10px var(--error); }
        .indicator.on { background: var(--neon); box-shadow: 0 0 10px var(--neon); }

        #log {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .entry {
            padding: 10px;
            border: 1px solid rgba(0, 255, 65, 0.2);
            background: rgba(0, 0, 0, 0.5);
            max-width: 85%;
            animation: blink 0.1s ease;
        }
        .entry.self { align-self: flex-end; border-color: var(--neon); background: rgba(0, 255, 65, 0.1); }
        .entry.sys { align-self: center; border: none; color: #888; font-size: 10px; }

        .input-area {
            padding: 20px;
            border-top: 2px solid var(--neon);
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            background: #000;
            border: 1px solid var(--neon);
            color: var(--neon);
            padding: 12px;
            outline: none;
            font-family: inherit;
        }

        button {
            background: var(--neon);
            color: #000;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
        }

        button:hover { opacity: 0.8; }

        /* QR Modal */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        #qrcode { background: white; padding: 20px; }

        @keyframes blink { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div class="status-box">
        <div id="dot" class="indicator"></div>
        <span id="st-text">SYSTEM OFFLINE</span>
    </div>
    <div style="display: flex; gap: 10px;">
        <button onclick="Core.copyLink()">LINK</button>
        <button onclick="Core.showQR()">QR</button>
    </div>
</header>

<div id="log"></div>

<div class="input-area">
    <button onclick="document.getElementById('f').click()">+</button>
    <input type="file" id="f" hidden onchange="Core.handleFile(this)">
    <input type="text" id="m" placeholder="TYPE MESSAGE..." autocomplete="off">
    <button onclick="Core.sendText()">SEND</button>
</div>

<div id="qrm" class="modal" onclick="this.style.display='none'">
    <div id="qrcode"></div>
    <p style="margin-top: 20px;">SCAN TO CONNECT</p>
</div>

<script>
/**
 * CORE ENGINE V3 - STABLE P2P
 */

const Core = {
    peer: null,
    conn: null,
    room: '',
    isHost: false,

    init() {
        const h = window.location.hash.substring(1) || Math.random().toString(36).substr(2, 6);
        window.location.hash = h;
        this.room = 'V3-ROOM-' + h;
        
        this.log('INITIALIZING NETWORK...', 'sys');
        
        // Пытаемся стать Хостом
        this.peer = new Peer(this.room, {
            debug: 2,
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        });

        this.peer.on('open', (id) => {
            this.isHost = true;
            this.updateStatus('WAITING FOR PEER...', true);
            this.log('CREATED ROOM: ' + id, 'sys');
        });

        this.peer.on('connection', (c) => {
            if (this.conn) this.conn.close(); // Только 1 активное соединение
            this.conn = c;
            this.setupEvents();
        });

        this.peer.on('error', (err) => {
            // Если ID занят — значит хост уже есть, подключаемся как клиент
            if (err.type === 'unavailable-id') {
                this.connectAsClient();
            } else {
                this.log('ERROR: ' + err.type, 'sys');
            }
        });
    },

    connectAsClient() {
        this.isHost = false;
        if (this.peer) this.peer.destroy();
        
        this.peer = new Peer(); // Рандомный ID для клиента
        this.peer.on('open', (id) => {
            this.log('CLIENT ID: ' + id, 'sys');
            const c = this.peer.connect(this.room, { reliable: true });
            this.conn = c;
            this.setupEvents();
        });
    },

    setupEvents() {
        this.conn.on('open', () => {
            this.updateStatus('LINK ESTABLISHED', true);
            this.log('SECURE CONNECTION READY', 'sys');
            
            // Heartbeat чтобы соединение не простаивало
            setInterval(() => { if(this.conn.open) this.conn.send({t:'ping'}); }, 3000);
        });

        this.conn.on('data', (data) => {
            if (data.t === 'ping') return;
            if (data.t === 'text') this.log(data.m, 'peer');
            if (data.t === 'file') this.download(data);
        });

        this.conn.on('close', () => {
            this.updateStatus('DISCONNECTED', false);
            this.log('CONNECTION LOST', 'sys');
            setTimeout(() => location.reload(), 2000);
        });
    },

    sendText() {
        const input = document.getElementById('m');
        const val = input.value.trim();
        if (!val || !this.conn || !this.conn.open) return;

        this.conn.send({ t: 'text', m: val });
        this.log(val, 'self');
        input.value = '';
    },

    handleFile(el) {
        const file = el.files[0];
        if (!file || !this.conn) return;

        this.log('SENDING: ' + file.name, 'sys');
        
        // Отправляем файл как Blob (PeerJS сам нарежет его)
        this.conn.send({
            t: 'file',
            file: file,
            name: file.name,
            type: file.type
        });
    },

    download(data) {
        const blob = new Blob([data.file], { type: data.type });
        const url = URL.createObjectURL(blob);
        this.log(`RECEIVED FILE: <a href="${url}" download="${data.name}" style="color:var(--neon)">[ DOWNLOAD ]</a>`, 'peer');
    },

    log(msg, type) {
        const div = document.createElement('div');
        div.className = 'entry ' + type;
        div.innerHTML = msg;
        const container = document.getElementById('log');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    },

    updateStatus(txt, on) {
        document.getElementById('st-text').innerText = txt;
        document.getElementById('dot').className = 'indicator ' + (on ? 'on' : '');
    },

    copyLink() {
        navigator.clipboard.writeText(window.location.href);
        this.log('LINK COPIED', 'sys');
    },

    showQR() {
        document.getElementById('qrm').style.display = 'flex';
        document.getElementById('qrcode').innerHTML = '';
        new QRCode(document.getElementById("qrcode"), window.location.href);
    }
};

// Enter key binding
document.getElementById('m').onkeypress = (e) => { if(e.key==='Enter') Core.sendText(); };

// Start
Core.init();
</script>
</body>
</html>
