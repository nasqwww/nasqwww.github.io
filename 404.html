<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Connection Lost</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #0a0a0f;
      --purple:    #8f00ff;
      --cyan:      #00f0ff;
      --red:       #ff003c;
      --white:     #e8e8ff;
      --dim:       #4a4a6a;
      --font-mono: 'Share Tech Mono', monospace;
      --font-head: 'Orbitron', sans-serif;
      --font-body: 'Rajdhani', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: crosshair;
      animation: pageIn .9s ease;
    }

    /* Page fade-in */
    @keyframes pageIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.04) 0px, rgba(0,0,0,0.04) 1px,
        transparent 1px, transparent 2px
      );
      pointer-events: none;
      z-index: 10;
    }

    /* Matrix canvas */
    #matrix-canvas {
      position: fixed; inset: 0;
      z-index: 0;
      opacity: .18;
    }

    /* Ambient orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(110px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-r {
      width: 380px; height: 380px;
      background: var(--red); opacity: .08;
      top: -100px; right: -100px;
      animation: orbFloat 14s ease-in-out infinite;
    }
    .orb-p {
      width: 280px; height: 280px;
      background: var(--purple); opacity: .1;
      bottom: -80px; left: -80px;
      animation: orbFloat 18s ease-in-out 5s infinite reverse;
    }
    @keyframes orbFloat {
      0%,100% { transform: translate(0,0); }
      50%      { transform: translate(25px,35px); }
    }

    /* ---- 404 big number ---- */
    .error-code {
      font-family: var(--font-head);
      font-size: clamp(7rem, 22vw, 16rem);
      font-weight: 900;
      line-height: 1;
      position: relative;
      z-index: 2;
      background: linear-gradient(135deg, var(--red) 20%, var(--purple) 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeUp .8s .2s ease both, errorGlitch 5s 1.5s infinite;
      filter: drop-shadow(0 0 30px rgba(255,0,60,0.3));
    }
    .error-code::before {
      content: '404';
      position: absolute; inset: 0;
      background: var(--cyan);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: errTop 5s 1.5s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 38%, 0 38%);
    }
    .error-code::after {
      content: '404';
      position: absolute; inset: 0;
      background: var(--red);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: errBot 5s 1.5s infinite;
      clip-path: polygon(0 62%, 100% 62%, 100% 100%, 0 100%);
    }
    @keyframes errorGlitch {
      0%,85%,100% { transform: none; }
      86% { transform: skewX(-2deg) translateX(-3px); }
      87% { transform: skewX(2deg)  translateX(3px); }
      88% { transform: none; }
    }
    @keyframes errTop {
      0%,85%,100% { transform: none; opacity: 0; }
      86% { transform: translate(-6px,-2px); opacity: .85; }
      87% { transform: translate(5px,1px);   opacity: .6; }
      88% { opacity: 0; }
    }
    @keyframes errBot {
      0%,85%,100% { transform: none; opacity: 0; }
      86% { transform: translate(6px,2px);   opacity: .85; }
      87% { transform: translate(-5px,-1px); opacity: .6; }
      88% { opacity: 0; }
    }

    /* ---- Glitch headline ---- */
    .glitch-headline {
      position: relative;
      z-index: 2;
      font-family: var(--font-head);
      font-size: clamp(1rem, 3.2vw, 2rem);
      font-weight: 700;
      letter-spacing: .06em;
      text-align: center;
      color: var(--white);
      margin-top: .8rem;
      padding: 0 1rem;
      animation: fadeUp .8s .5s ease both, headlineGlitch 3.8s 2s infinite;
    }
    .glitch-headline::before {
      content: attr(data-text);
      position: absolute; inset: 0;
      color: var(--red);
      animation: hlTop 3.8s 2s infinite;
      clip-path: polygon(0 15%, 100% 15%, 100% 55%, 0 55%);
    }
    .glitch-headline::after {
      content: attr(data-text);
      position: absolute; inset: 0;
      color: var(--cyan);
      animation: hlBot 3.8s 2s infinite;
      clip-path: polygon(0 45%, 100% 45%, 100% 85%, 0 85%);
    }
    @keyframes headlineGlitch {
      0%,82%,100% { transform: none; }
      83% { transform: skewX(-1.5deg) translateX(-2px); }
      84% { transform: skewX(1.5deg)  translateX(2px); }
      85% { transform: none; }
    }
    @keyframes hlTop {
      0%,82%,100% { transform: none; opacity: 0; }
      83% { transform: translate(-5px,-2px); opacity: .9; }
      84% { transform: translate(4px,1px);   opacity: .6; }
      85% { opacity: 0; }
    }
    @keyframes hlBot {
      0%,82%,100% { transform: none; opacity: 0; }
      83% { transform: translate(5px,2px);   opacity: .9; }
      84% { transform: translate(-4px,-1px); opacity: .6; }
      85% { opacity: 0; }
    }

    /* Sub-text */
    .sub-text {
      z-index: 2;
      font-family: var(--font-mono);
      font-size: .68rem;
      letter-spacing: .25em;
      color: var(--dim);
      margin-top: 1.2rem;
      text-align: center;
      animation: fadeUp .8s .8s ease both;
    }
    .sub-text em { color: rgba(0,240,255,0.5); font-style: normal; }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: 1rem;
      margin-top: 2.4rem;
      flex-wrap: wrap;
      justify-content: center;
      z-index: 2;
      animation: fadeUp .8s 1.1s ease both;
    }
    .btn {
      font-family: var(--font-mono);
      font-size: .65rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      padding: .85rem 2.2rem;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: transform .2s, box-shadow .3s;
    }
    .btn-home {
      background: linear-gradient(135deg, var(--red), var(--purple));
      color: #fff;
      clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
    }
    .btn-home:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 32px rgba(255,0,60,0.4);
    }
    .btn-ghost {
      background: transparent;
      color: var(--cyan);
      border: 1px solid rgba(0,240,255,0.35);
      clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
    }
    .btn-ghost:hover {
      background: rgba(0,240,255,0.06);
      border-color: var(--cyan);
      transform: translateY(-3px);
      box-shadow: 0 0 22px rgba(0,240,255,0.25);
    }

    /* Terminal blink */
    .terminal-line {
      z-index: 2;
      margin-top: 2.8rem;
      font-family: var(--font-mono);
      font-size: .6rem;
      letter-spacing: .2em;
      color: rgba(0,240,255,0.3);
      animation: fadeUp .8s 1.4s ease both;
    }
    .blink { animation: blinkAnim .9s step-end infinite; }
    @keyframes blinkAnim { 50% { opacity: 0; } }

    /* Back nav */
    .back-nav {
      position: fixed;
      top: 1.5rem; left: 2rem;
      z-index: 50;
      font-family: var(--font-mono);
      font-size: .6rem;
      letter-spacing: .2em;
      color: var(--dim);
      text-transform: uppercase;
      text-decoration: none;
      transition: color .3s;
      animation: fadeDown .6s .1s ease both;
    }
    .back-nav:hover { color: var(--cyan); }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-nav">← RETURN TO GRID</a>

  <div class="orb orb-r"></div>
  <div class="orb orb-p"></div>

  <!-- Matrix rain canvas -->
  <canvas id="matrix-canvas"></canvas>

  <!-- Large 404 -->
  <div class="error-code">404</div>

  <!-- Glitch headline -->
  <h1
    class="glitch-headline"
    data-text="Connection Lost in the Matrix"
  >Connection Lost in the Matrix</h1>

  <p class="sub-text">
    ERROR_CODE: <em>0x404</em> — NODE UNREACHABLE — SIGNAL LOST
  </p>

  <div class="btn-group">
    <a href="index.html" class="btn btn-home">↩ RECONNECT</a>
    <a href="index.html#contact" class="btn btn-ghost">REPORT ANOMALY</a>
  </div>

  <div class="terminal-line">
    > ATTEMPTING REROUTE<span class="blink">_</span>
  </div>

  <script>
    /* Matrix character rain */
    (function initMatrix() {
      const canvas = document.getElementById('matrix-canvas');
      const ctx    = canvas.getContext('2d');

      // Katakana + alphanumeric character set
      const CHARS = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ#@!%&';
      const FS    = 14; // font size in px
      let cols, drops;

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        cols  = Math.floor(canvas.width / FS);
        drops = Array(cols).fill(1);
      }

      function draw() {
        // Semi-transparent overlay for fading trail
        ctx.fillStyle = 'rgba(10,10,15,0.08)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.font = `${FS}px 'Share Tech Mono', monospace`;

        for (let i = 0; i < drops.length; i++) {
          const char = CHARS[Math.floor(Math.random() * CHARS.length)];
          const x    = i * FS;
          const y    = drops[i] * FS;

          // Color varies by column position — purple base, occasional red/cyan
          const rand = Math.random();
          if (rand < 0.03)       ctx.fillStyle = '#00f0ff';  // cyan sparkle
          else if (rand < 0.08)  ctx.fillStyle = 'rgba(255,0,60,0.85)'; // red accent
          else                   ctx.fillStyle = 'rgba(143,0,255,0.85)'; // purple main

          ctx.fillText(char, x, y);

          // Reset column after it exits the screen
          if (y > canvas.height && Math.random() > 0.975) drops[i] = 0;
          drops[i]++;
        }
      }

      window.addEventListener('resize', resize);
      resize();
      setInterval(draw, 42); // ~24fps
    })();
  </script>

</body>
</html>
